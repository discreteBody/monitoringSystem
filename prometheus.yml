global:
  scrape_interval: 15s
  evaluation_interval: 15s

# THIS IS THE MISSING PIECE!
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # This points to the service name in docker-compose.yml
            - 'alertmanager:9093'

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']