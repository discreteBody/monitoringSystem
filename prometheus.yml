global:
  scrape_interval: 15s
  evaluation_interval: 15s # How often to check the alert rules

rule_files:
  - "alert_rules.yml" # <--- Add this line

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']