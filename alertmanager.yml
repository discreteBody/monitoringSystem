global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 5s
  group_interval: 5s
  repeat_interval: 1h
  receiver: 'discord-webhook'

receivers:
  - name: 'discord-webhook'
    discord_configs:
      # Notice: NO /slack at the end of this URL!
      - webhook_url: 'https://discord.com/api/webhooks/1476512160375898253/k-JS80yPgRMhZSXfcBBKHXjsphfrVFfbqqSu8aH8-yinfVynF_8rJdjUfaps1Fcf6V4I'
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        message: >-
          {{ range .Alerts }}
            **Summary:** {{ .Annotations.summary }}
            **Description:** {{ .Annotations.description }}
            **Severity:** {{ .Labels.severity }}
          {{ end }}